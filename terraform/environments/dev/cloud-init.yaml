#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - git
  - unzip
  - nginx
  - ufw

write_files:
  - path: /opt/boom/docker-compose.yml
    permissions: '0644'
    content: |
      services:
        postgres:
          image: postgres:16-alpine
          container_name: boom-postgres
          restart: unless-stopped
          environment:
            POSTGRES_DB: boom
            POSTGRES_USER: boom
            POSTGRES_PASSWORD: change-me-before-production
          ports:
            - "5432:5432"
          volumes:
            - boom_postgres_data:/var/lib/postgresql/data

        nginx:
          image: nginx:alpine
          container_name: boom-nginx
          restart: unless-stopped
          ports:
            - "80:80"
            - "443:443"
          volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

      volumes:
        boom_postgres_data:

  - path: /opt/boom/nginx/default.conf
    permissions: '0644'
    content: |
      server {
          listen 80;
          server_name _;

          location / {
              return 200 'Boom infrastructure is running';
              add_header Content-Type text/plain;
          }
      }

runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ubuntu || true
  - cd /opt/boom && docker compose up -d
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
