services:
  postgres:
    image: postgres:16-alpine
    container_name: boom-local-postgres
    environment:
      POSTGRES_DB: boom
      POSTGRES_USER: boom
      POSTGRES_PASSWORD: boom
    ports:
      - "5432:5432"
    volumes:
      - boom_local_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: boom-local-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@boom.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: boom-local-nginx
    ports:
      - "8088:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  boom_local_postgres_data:
